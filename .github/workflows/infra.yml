name: infra

on:
  pull_request:
    paths:
      - "deploy/terraform/**"
      - ".github/workflows/infra.yml"
  push:
    branches: [main]
    paths:
      - "deploy/terraform/**"
  workflow_dispatch:
    inputs:
      env:
        description: Environment to apply
        type: choice
        options: [dev]
        default: dev

permissions:
  contents: read
  id-token: write        # OIDC -> AWS (no stored credentials)
  pull-requests: write   # post the plan as a PR comment

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.6.6
  ENV: ${{ github.event.inputs.env || 'dev' }}

jobs:
  # ---- PLAN on pull requests (read-only role), posted as a PR comment ----
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: terraform-plan-${{ github.ref }}
      cancel-in-progress: true
    defaults:
      run:
        working-directory: deploy/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PLAN_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - name: fmt
        run: terraform fmt -recursive -check -diff
      - name: init
        run: terraform init -input=false -backend-config=envs/${ENV}.backend.hcl
      - name: validate
        run: terraform validate -no-color
      - name: plan
        id: plan
        run: |
          set -o pipefail
          terraform plan -input=false -lock-timeout=5m \
            -var-file=envs/${ENV}.tfvars -no-color 2>&1 | tee plan.txt
      - name: comment plan on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let plan = '';
            try { plan = fs.readFileSync('deploy/terraform/plan.txt', 'utf8'); } catch (e) { plan = 'No plan output.'; }
            const max = 60000;
            if (plan.length > max) plan = plan.slice(0, max) + '\n... (truncated)';
            const body = `### Terraform plan (\`${process.env.ENV}\`)\n\n<details><summary>Show plan</summary>\n\n\`\`\`\n${plan}\n\`\`\`\n\n</details>`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  # ---- APPLY on merge to main or manual dispatch, gated by the GitHub Environment ----
  apply:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.env || 'dev' }}   # required-reviewer gate = the guardrail
    concurrency:
      group: terraform-apply-${{ github.event.inputs.env || 'dev' }}
      cancel-in-progress: false
    defaults:
      run:
        working-directory: deploy/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_APPLY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - name: init
        run: terraform init -input=false -backend-config=envs/${ENV}.backend.hcl
      - name: apply
        run: terraform apply -input=false -auto-approve -lock-timeout=5m -var-file=envs/${ENV}.tfvars
