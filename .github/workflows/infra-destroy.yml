name: infra-destroy

# Manual teardown between sessions (cost). Environment-gated + typed confirmation.
on:
  workflow_dispatch:
    inputs:
      env:
        description: Environment to destroy
        type: choice
        options: [dev]
        default: dev
      confirm:
        description: Type "destroy-<env>" exactly to confirm (e.g. destroy-dev)
        type: string
        required: true

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.6.6
  ENV: ${{ github.event.inputs.env }}
  # GitHub OIDC -> Entra for the azuread provider (destroy removes the Entra app too).
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  destroy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.env }}
    concurrency:
      group: terraform-apply-${{ github.event.inputs.env }}
      cancel-in-progress: false
    defaults:
      run:
        working-directory: deploy/terraform
    steps:
      - name: confirm guard
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "destroy-${ENV}" ]; then
            echo "Confirmation mismatch. Expected 'destroy-${ENV}'." >&2
            exit 1
          fi
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_APPLY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - name: init
        run: terraform init -input=false -backend-config=envs/${ENV}.backend.hcl
      - name: destroy
        run: terraform destroy -input=false -auto-approve -lock-timeout=5m -var-file=envs/${ENV}.tfvars
