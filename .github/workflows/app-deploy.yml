name: app-deploy

# Build + push the app image on merge to main, and record it to SSM.
# It does NOT run Terraform: `infra` (env-gated) is the sole applier and reads the
# image from SSM. To roll a new image, run `infra` (Actions > infra > Run workflow >
# env=dev) and approve the `dev` environment. This keeps the approval gate as the guardrail
# and avoids `-target` partial-graph hazards.
on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/app-deploy.yml"
  workflow_dispatch:
    inputs:
      env:
        description: Environment
        type: choice
        options: [dev]
        default: dev

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  ENV: ${{ github.event.inputs.env || 'dev' }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    # No `environment:`: assumes the DEPLOY role (sub=...:ref:refs/heads/main).
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: ECR login
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: build & push image
        id: build
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="${REGISTRY}/eop-${ENV}-app:${GITHUB_SHA}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
      - name: record image to SSM (infra apply reads this)
        run: |
          aws ssm put-parameter --name "/eop/${ENV}/app_image" \
            --type String --overwrite --value "${{ steps.build.outputs.image }}"
      - name: next step
        run: echo "Image pushed + recorded. Run the 'infra' workflow (env=dev) and approve to roll it."
