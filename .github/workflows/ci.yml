name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Authoritative build path (ADR-0008): the Dockerfile's maven:temurin-21 stage builds the jar.
      - name: Docker build (compiles + packages the app)
        run: docker build -t eop-app:ci .

  # Phase 2: the correctness gate. Runs the full suite incl. Testcontainers (real Postgres+pgvector and
  # Redis) on the runner's Docker. Kept separate from the `app` image build, which uses -DskipTests for a
  # fast deterministic artifact (Testcontainers can't reliably reach Docker from inside `docker build`).
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Maven verify (unit + Testcontainers + ArchUnit)
        working-directory: app
        run: mvn -B -e verify

  openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20" # nimma/Spectral JIT is unstable on newer Node
      - name: Spectral lint (frozen contract can't drift invalid)
        run: npx --yes @stoplight/spectral-cli@6 lint docs/api/openapi-v1.yaml --ruleset .spectral.yaml --fail-severity=error

  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy/terraform
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.6.6
      - name: fmt
        run: terraform fmt -recursive -check -diff
      - name: init (no backend)
        run: terraform init -backend=false -input=false
      - name: validate
        run: terraform validate -no-color

  # The Angular client's gate. Runs on every PR (not path-filtered) on purpose:
  # the contract-drift step regenerates the typed client from the frozen OpenAPI
  # and fails on any diff, so a backend PR that edits docs/api/openapi-v1.yaml is
  # caught here too — not just frontend-only PRs.
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20" # Angular 18 doesn't support Node 24; matches .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install (clean, lockfile-pinned)
        run: npm ci
      - name: Contract drift gate (regenerate types from the frozen OpenAPI; fail on diff)
        run: npm run check:contract
      - name: Lint
        run: npm run lint
      - name: Build (production)
        run: npm run build
      - uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2.1.2
        id: setup-chrome
      - name: Unit tests (headless)
        run: npm run test:ci
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}

  # Expand/contract migration guard (DECISIONS ADR-0025). Every deploy runs old+new app images against the
  # same DB (Phase 8 rolling: min-100/max-200; Phase 9 blue/green: the bake), so destructive or lock-heavy
  # DDL can break or block the still-serving old version. This SOFT guard scans the migrations a PR
  # adds/changes and emits warnings pointing at ADR-0025 — it never fails the build (destructive DDL is
  # legitimate in a contract release; the guard makes that an explicit, reviewed choice). PR-only: it needs a
  # base ref to diff against.
  migrations:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Migration guard (ADR-0025 expand/contract)
        run: |
          git fetch --quiet origin "${{ github.base_ref }}"
          bash scripts/check-migrations.sh "origin/${{ github.base_ref }}"
