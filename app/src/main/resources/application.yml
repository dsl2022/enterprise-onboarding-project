server:
  port: 8080
  forward-headers-strategy: framework   # behind ALB: trust X-Forwarded-* for correct redirect URIs
  # Phase 8 (HA, ≥2 tasks): on SIGTERM (scale-in / rolling deploy) drain in-flight requests and stop the
  # @Scheduled pollers cleanly instead of cutting them. Tomcat waits up to the timeout below; a tick that
  # IS cut mid-flight stays safe (the reaper re-claims; the relays are idempotent). The ECS container
  # stopTimeout (TF) is set ABOVE this window so ECS doesn't SIGKILL mid-drain.
  shutdown: graceful

spring:
  application:
    name: enterprise-onboarding-app
  lifecycle:
    timeout-per-shutdown-phase: 25s     # max graceful-drain window before the context force-stops
  mvc:
    problemdetails:
      enabled: true   # framework exceptions (401/404/422 …) render as RFC-7807 problem+json too

# External base URL (CloudFront). Used for the OIDC post-logout redirect target.
app:
  base-url: ${APP_BASE_URL:}

# Provisioning (Phase 4/5). `simulate` is PER VERTICAL — onboarding and access activate independently, so
# 4b (onboarding real) can't disable the access simulator whose real impl (5b) doesn't exist yet. Each
# simulator/real-provisioner keys on its own flag; both default true (synthetic, no Graph/consent) so
# local + CI + tests just work. Deployment flips a vertical's `simulate` to false ONLY once its real
# provisioner exists AND its Graph permission is admin-consented. Schedulers are also per-vertical: off by
# default (tests call runOnce() directly), on in deployment so the workers process requests.
eop:
  provisioning:
    onboarding:
      # simulate: false    # EOP_PROVISIONING_ONBOARDING_SIMULATE=false → real GraphProvisioner (needs wif + OwnedBy consent)
      # scheduler: true     # EOP_PROVISIONING_ONBOARDING_SCHEDULER=true in deployment
    access:
      # simulate: false    # EOP_PROVISIONING_ACCESS_SIMULATE=false → real group provisioning (5b; needs GroupMember.ReadWrite.All consent)
      # scheduler: true     # EOP_PROVISIONING_ACCESS_SCHEDULER=true in deployment
    poll-ms: ${EOP_PROVISIONING_POLL_MS:10000}
    lease-seconds: ${EOP_PROVISIONING_LEASE_SECONDS:300}        # reaper lease; > worst-case provision duration
    backoff-cap-seconds: ${EOP_PROVISIONING_BACKOFF_CAP_SECONDS:3600}
  graph:
    base-url: ${EOP_GRAPH_BASE_URL:https://graph.microsoft.com/v1.0}

# Actuator: keep the surface tiny. /healthz is our own controller; actuator stays internal-only.
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      probes:
        enabled: true

# Workload OIDC issuer / WIF. Disabled by default so Phase 1 local + CI runs need no AWS.
# Turned on (env vars) by the ECS task in Phase 4.
wif:
  enabled: ${WIF_ENABLED:false}
  issuer-host: ${WIF_ISSUER_HOST:}            # https://<cloudfront-domain>  (terraform output issuer_url)
  issuer-bucket: ${WIF_ISSUER_BUCKET:}        # terraform output issuer_bucket
  signing-secret-name: ${WIF_SIGNING_SECRET_NAME:}  # terraform output issuer_signing_secret_arn
  subject: ${WIF_SUBJECT:}                     # workload subject; must match the Entra federated credential
  region: ${AWS_REGION:}
  tenant-id: ${ENTRA_TENANT_ID:}              # Flow 2 token-exchange authority
  client-id: ${ENTRA_APP_CLIENT_ID:}          # client_id in the WIF exchange

# ---- Phase 3+ placeholders (Flow 1 login), sourced from env, never committed ----
# entra:
#   tenant-id:     ${ENTRA_TENANT_ID}          # 5b7b1ae8-bcc5-485f-ad46-cb099090670e
#   app-client-id: ${ENTRA_APP_CLIENT_ID}      # created in Phase 3
logging:
  level:
    com.eop: INFO
