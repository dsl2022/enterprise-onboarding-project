# Active under the `data` profile (SPRING_PROFILES_ACTIVE=auth,data on ECS). Brings up persistence
# (JPA/Postgres + Flyway) and the Redis-backed BFF session. Additive to `auth`: local/CI boots that
# don't set this profile need no DB or Redis. All coordinates from env; the DB password is injected
# by ECS from the RDS-managed secret (never committed, never an env literal in TF).
spring:
  datasource:
    # Phase 10-1 Stage 2: the RUNTIME connection uses the least-privilege role eop_app (no UPDATE/DELETE on
    # audit; ADR-0026). Password auth (IAM-token login is blocked in this env — #175). In tests the
    # @ServiceConnection Testcontainer overrides url/username/password, so these values are only read on ECS.
    # sslmode=require: RDS rejects unencrypted connections ("no encryption"), and encryption is mandatory for
    # the DB password not to cross the wire in the clear. (Testcontainers has no TLS, but @ServiceConnection
    # replaces this whole URL there, so it only applies on ECS.)
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:eop}?sslmode=require
    username: eop_app
    password: ${EOP_APP_DB_PASSWORD}
    hikari:
      # On the first Phase-2 roll RDS may still be initializing. Don't hard-fail the pool at startup;
      # Flyway's connect-retries (below) does the actual waiting before the first query.
      initialization-fail-timeout: -1
      # Phase 8 (HA): pin the pool so the per-task connection ceiling is explicit, not an implicit default.
      # Budget: tasks × max-pool (+ Flyway + the relay/issuer short-lived advisory-lock connection) must stay
      # under RDS max_connections. At desired_count=2 that's ~2×10=20 on db.t4g.micro — comfortable. Scaling
      # tasks (or autoscaling, later) MUST re-check max_connections against this number.
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    # Flyway owns the schema; Hibernate only validates against it (no auto-DDL in any env).
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    # Phase 10-1 Stage 2: MIGRATOR = the master user (needs DDL + role admin), distinct from the eop_app
    # runtime datasource above. No flyway.url → Flyway reuses the datasource URL with THESE creds. Defaults are
    # the Testcontainers superuser ("test"/"test") so CI/local — where DB_USERNAME/DB_PASSWORD are unset and
    # @ServiceConnection provides the container — still migrates as a superuser (DDL works).
    user: ${DB_USERNAME:test}
    password: ${DB_PASSWORD:test}
    # V11 sets eop_app's password from this placeholder (= the same secret the datasource reads). Default keeps
    # CI green (eop_app is never connected-to in tests; @ServiceConnection uses the container superuser).
    placeholders:
      eop_app_password: ${EOP_APP_DB_PASSWORD:test}
    # ~10 min RDS cold-start budget (60 * 10s) so the app waits the DB out instead of crash-looping.
    connect-retries: 60
    connect-retries-interval: 10
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
  session:
    store-type: redis
    timeout: 30m

# Readiness reflects DB + Redis for observability ONLY. The ALB target-group check stays on the
# dependency-free /healthz controller — a transient DB blip must not cycle every task.
management:
  endpoint:
    health:
      group:
        readiness:
          include: readinessState, db, redis
